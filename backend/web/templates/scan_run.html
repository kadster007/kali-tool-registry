{% extends "base.html" %}
{% block content %}
<h1>Scan running</h1>
<div class="meta">
  <div><strong>Command:</strong> <code>{{ cmd }}</code></div>
  <div><strong>Log:</strong> <code>~/{{ log_rel }}</code></div>
  <div><strong>Job:</strong> <code>{{ job_id }}</code></div>
</div>

<pre id="output" class="terminal"></pre>

<script>
(function(){
  const out = document.getElementById('output');
  const proto = (location.protocol === 'https:') ? 'wss' : 'ws';
  const ws = new WebSocket(proto + '://' + location.host + '/ws/scan/{{ job_id }}');
  ws.onmessage = (ev) => {
    out.textContent += ev.data;
    out.scrollTop = out.scrollHeight;
  };
  ws.onclose = () => {
    out.textContent += '\n[ws closed]\n';
  };
  ws.onerror = (e) => {
    out.textContent += '\n[ws error]\n';
  };
})();
</script>

<p style="margin-top:1.5em">
  <a class="btn-outline" href="/scan">New scan</a>
  <a class="btn-outline" href="/logs">All logs</a>
</p>
{% endblock %}
