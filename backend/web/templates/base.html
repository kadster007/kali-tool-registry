<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ShadowOps</title>
<script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header class="nav">
  <button class="icon-btn" id="toggle-left" title="Toggle dashboard">☰</button>
  <div class="brand">ShadowOps</div>
  <nav>
    <a class="{% if page=='dashboard' %}active{% endif %}" href="/">Dashboard</a>
    <a class="{% if page=='scan' %}active{% endif %}" href="/scan">Scan</a>
    <a class="{% if page=='tools' %}active{% endif %}" href="/tools">Tools</a>
    <a class="{% if page=='logs' %}active{% endif %}" href="/logs">Logs</a>
  </nav>
  <div class="nav-right">
    <button class="icon-btn" id="toggle-term" title="Toggle terminal">⌨</button>
  </div>
</header>

<div class="layout" id="layout">
  <!-- LEFT SIDEBAR: dashboard (pivot + fold6 + phases) -->
  <aside class="sidebar left" id="sidebar-left">
    <!-- Each panel loads independently; failures don't cascade -->
    <section class="panel" id="pivot-panel"
             hx-get="/api/pivot_panel" hx-trigger="load" hx-swap="innerHTML">
      <div class="panel-loading">Loading pivot…</div>
    </section>

    <section class="panel" id="fold6-panel"
             hx-get="/api/fold6_panel?force=0" hx-trigger="load" hx-swap="innerHTML">
      <div class="panel-loading">Loading Fold 6…</div>
    </section>

    <section class="panel" id="phases-panel"
             hx-get="/api/phases_panel" hx-trigger="load" hx-swap="innerHTML">
      <div class="panel-loading">Loading phases…</div>
    </section>
  </aside>

  <div class="resizer vertical" id="resizer-left" data-side="left"
       title="Drag to resize · double-click to reset"></div>

  <div class="middle" id="middle">
    <main class="main" id="main">
      <!-- Target widget: auto-fills preset variables. Pulls from /api/phone_info. -->
      <section class="target-bar" id="target-bar">
        <div class="target-fields">
          <label>Target
            <input id="target-input" type="text" placeholder="(loading from Fold 6…)" autocomplete="off" />
          </label>
          <label>Ports
            <input id="ports-input" type="text" placeholder="(uses preset default)" autocomplete="off" />
          </label>
          <button class="btn-sm" id="target-from-phone" title="Refresh from Fold 6 (uses current Wi-Fi subnet)">↺ from Fold 6</button>
        </div>
        <div class="target-hint hint small" id="target-hint">Target auto-fills with phone's Wi-Fi subnet when the pivot is up.</div>
      </section>

      {% block content %}{% endblock %}
    </main>

    <div class="resizer horizontal" id="resizer-term"
         title="Drag to resize terminal · double-click to reset"></div>

    <section class="terminal-panel" id="terminal-panel">
      <div class="terminal-bar">
        <span class="terminal-title">Terminal</span>
        <span class="terminal-mode" id="term-mode">kadx</span>
        <div class="terminal-actions">
          <button class="btn-sm"  id="term-local">kadx shell</button>
          <button class="btn-sm"  id="term-phone">SSH to phone</button>
          <button class="btn-sm warn" id="term-reset">Reset</button>
        </div>
      </div>
      <div class="terminal-host" id="terminal-host"></div>
    </section>
  </div>
</div>

<footer><small>ShadowOps · pivot via Fold 6 · runs on kadx</small></footer>

<!-- xterm.js + FitAddon -->
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>

<script src="/static/sidebar.js"></script>
<script src="/static/terminal.js"></script>
<script src="/static/target.js"></script>
</body>
</html>
