<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ShadowOps</title>
<script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header class="nav">
  <button class="icon-btn" id="toggle-left" title="Toggle dashboard">☰</button>
  <div class="brand">ShadowOps</div>
  <nav>
    <a class="{% if page=='dashboard' %}active{% endif %}" href="/">Dashboard</a>
    <a class="{% if page=='scan' %}active{% endif %}" href="/scan">Scan</a>
    <a class="{% if page=='tools' %}active{% endif %}" href="/tools">Tools</a>
    <a class="{% if page=='hosts' %}active{% endif %}" href="/hosts">Hosts</a>
    <a class="{% if page=='logs' %}active{% endif %}" href="/logs">Logs</a>
    <a class="{% if page=='notes' %}active{% endif %}" href="/notes">Notes</a>
  </nav>
  <div class="nav-right">
    <button class="icon-btn" id="toggle-term" title="Toggle terminal">⌨</button>
    <button class="icon-btn" onclick="shadowops.openSettings()" title="Settings">⚙</button>
  </div>
</header>

<div class="layout" id="layout">
  <!-- LEFT SIDEBAR: dashboard (pivot + fold6 + phases) -->
  <aside class="sidebar left" id="sidebar-left">
    <!-- Each panel loads independently; failures don't cascade -->
    <section class="panel" id="status-panel"
             hx-get="/api/status_panel" hx-trigger="load" hx-swap="innerHTML">
      <div class="panel-loading">Loading status…</div>
    </section>

    <section class="panel" id="phases-panel"
             hx-get="/api/phases_panel" hx-trigger="load" hx-swap="innerHTML">
      <div class="panel-loading">Loading phases…</div>
    </section>
  </aside>

  <div class="resizer vertical" id="resizer-left" data-side="left"
       title="Drag to resize · double-click to reset"></div>

  <div class="middle" id="middle">
    <main class="main" id="main">
      <!-- Target widget: auto-fills preset variables. Pulls from /api/phone_info.
           Inputs are readonly by default so the soft keyboard doesn't pop up
           every time we render. Tap the ✏ button to edit. -->
      <section class="target-bar" id="target-bar">
        <div class="target-fields">
          <label>Target
            <input id="target-input" type="text" placeholder="(loading from Fold 6…)" autocomplete="off" inputmode="none" readonly />
          </label>
          <label>Ports
            <input id="ports-input" type="text" placeholder="(uses preset default)" autocomplete="off" inputmode="none" readonly />
          </label>
          <button class="btn-sm" id="target-edit" title="Make Target/Ports editable">✏ Edit</button>
          <button class="btn-sm" id="target-from-phone" title="Refresh from Fold 6 (uses current Wi-Fi subnet)">↺ from Fold 6</button>
        </div>
        <div class="target-hint hint small" id="target-hint">Target auto-fills with phone's Wi-Fi subnet when the pivot is up.</div>
      </section>

      {% block content %}{% endblock %}
    </main>

    <div class="resizer horizontal" id="resizer-term"
         title="Drag to resize terminal · double-click to reset"></div>

    <section class="terminal-panel" id="terminal-panel">
      <div class="terminal-bar">
        <span class="terminal-title">Terminal</span>
        <span class="terminal-mode" id="term-mode">kadx</span>
        <div class="terminal-actions">
          <button class="btn-sm"  id="term-local">kadx shell</button>
          <button class="btn-sm"  id="term-phone">SSH to phone</button>
          <button class="btn-sm warn" id="term-reset">Reset</button>
        </div>
      </div>
      <!-- Mobile keyboard helper: keys mobile soft keyboards usually lack -->
      <div class="terminal-keys" id="terminal-keys">
        <button class="kbd-btn" data-keys="\t" title="Tab">Tab</button>
        <button class="kbd-btn" data-keys="" title="Esc">Esc</button>
        <button class="kbd-btn" data-keys="[A" title="Up">↑</button>
        <button class="kbd-btn" data-keys="[B" title="Down">↓</button>
        <button class="kbd-btn" data-keys="[D" title="Left">←</button>
        <button class="kbd-btn" data-keys="[C" title="Right">→</button>
        <button class="kbd-btn" data-keys="" title="Ctrl-C">^C</button>
        <button class="kbd-btn" data-keys="" title="Ctrl-D / EOF">^D</button>
        <button class="kbd-btn" data-keys="" title="Ctrl-Z">^Z</button>
        <button class="kbd-btn" data-keys="" title="Ctrl-L / clear">^L</button>
        <button class="kbd-btn" id="kbd-focus" title="Open soft keyboard">⌨</button>
      </div>
      <div class="terminal-host" id="terminal-host"></div>
    </section>
  </div>
</div>

<footer>
  <small>
    ShadowOps · {{ app_version().display }} ·
    <a href="#" onclick="shadowops.updateKadx(event)">update kadx</a> ·
    <a href="#" onclick="shadowops.updatePhone(event)">update phone</a>
  </small>
  <div id="update-result" class="hint small" style="display:none"></div>
</footer>

<!-- xterm.js + FitAddon -->
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>

<script src="/static/prefs.js"></script>
<script src="/static/sidebar.js"></script>
<script src="/static/terminal.js"></script>
<script src="/static/target.js"></script>
</body>
</html>
