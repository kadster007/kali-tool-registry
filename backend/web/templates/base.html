<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ShadowOps</title>
<script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header class="nav">
  <div class="brand">ShadowOps</div>
  <nav>
    <a class="{% if page=='dashboard' %}active{% endif %}" href="/">Dashboard</a>
    <a class="{% if page=='scan' %}active{% endif %}" href="/scan">Scan</a>
    <a class="{% if page=='tools' %}active{% endif %}" href="/tools">Tools</a>
    <a class="{% if page=='logs' %}active{% endif %}" href="/logs">Logs</a>
  </nav>
  <div class="nav-right">
    <button class="icon-btn" id="toggle-left" title="Toggle left panel">⬅</button>
    <button class="icon-btn" id="toggle-right" title="Toggle right panel">➡</button>
  </div>
</header>

<div class="layout" id="layout">
  <!-- LEFT SIDEBAR: pivot + phone state -->
  <aside class="sidebar left" id="sidebar-left"
         hx-get="/api/left_panel" hx-trigger="load, every 12s" hx-swap="innerHTML">
    <div class="sidebar-loading">Loading pivot state…</div>
  </aside>

  <div class="resizer" id="resizer-left" data-side="left"></div>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <div class="resizer" id="resizer-right" data-side="right"></div>

  <!-- RIGHT SIDEBAR: live logs -->
  <aside class="sidebar right" id="sidebar-right"
         hx-get="/api/right_panel" hx-trigger="load, every 15s" hx-swap="innerHTML">
    <div class="sidebar-loading">Loading logs…</div>
  </aside>
</div>

<footer><small>ShadowOps · pivot via Fold 6 · runs on kadx</small></footer>

<script src="/static/sidebar.js"></script>
</body>
</html>
