<div class="panel-header">
  <h3>Pivot</h3>
  <button class="icon-btn-sm" title="Re-check pivot"
          hx-get="/api/pivot_panel" hx-target="#pivot-panel" hx-swap="innerHTML">↻</button>
</div>

<div class="status-card compact">
  <div class="status-row">
    <span class="status-label">Tunnel</span>
    {% if tunnel_up %}
      <span class="status-pill up">UP</span>
    {% else %}
      <span class="status-pill down">DOWN</span>
    {% endif %}
  </div>
</div>

<div class="pivot-controls">
  {% if tunnel_up %}
    <button class="btn-sm warn"   hx-post="/api/pivot/release" hx-confirm="Kill autossh on phone?"
            hx-target="#pivot-action-result" hx-swap="innerHTML">Release</button>
    <button class="btn-sm"        hx-post="/api/pivot/reset"   hx-confirm="Kill + relaunch autossh on phone?"
            hx-target="#pivot-action-result" hx-swap="innerHTML">Reset</button>
    <button class="btn-sm danger" hx-post="/api/pivot/restart" hx-confirm="Kill microsocks + autossh, then restart?"
            hx-target="#pivot-action-result" hx-swap="innerHTML">Restart</button>
  {% else %}
    <button class="btn"         hx-post="/api/pivot/start" hx-target="#pivot-action-result"
            hx-swap="innerHTML">Start pivot</button>
    <button class="btn-outline" onclick="document.getElementById('pivot-start-cmd').style.display='block'">Show cmd</button>
  {% endif %}
  <button class="btn-sm" id="open-phone-shell" title="SSH to phone via the dedicated tunnel channel">SSH to phone</button>
  <button class="btn-sm danger" hx-post="/api/pivot/kill_autossh" hx-confirm="Kill autossh + microsocks on the phone? (Tunnel will need manual restart.)"
          hx-target="#pivot-action-result" hx-swap="innerHTML"
          title="Force-stop autossh on the phone (good for flapping tunnels)">Kill autossh</button>
</div>

<div class="pivot-controls" style="margin-top:0.3em">
  <button class="btn-sm" hx-get="/api/diagnostic"
          hx-target="#diag-result" hx-swap="innerHTML">Re-check pivot</button>
</div>
<div id="diag-result" class="diag-result"></div>
<div id="pivot-action-result" class="hint small"></div>
<pre id="pivot-start-cmd" class="terminal-static" style="display:none">
~/portable-pivot/frontend/pivot-up.sh
</pre>
