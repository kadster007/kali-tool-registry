{% extends "base.html" %}
{% block content %}
<h1>Dashboard</h1>
<p class="hint">
  Pivot status, Fold 6 connection, and recent activity are shown in the sidebars
  (auto-refresh every ~12s). Use the buttons in the left sidebar to control the
  pivot, or jump to <a href="/scan">Scan</a> / <a href="/tools">Tools</a>.
</p>

<h2>Quick scan</h2>
<form method="post" action="/scan" class="scan-form">
  <label>Target (host or CIDR)
    <input name="target" required placeholder="192.168.1.0/24 or 192.168.1.42" />
  </label>
  <label>Ports
    <input name="ports" value="22,80,443,445,3389,8080,8443" />
  </label>
  <button type="submit">Scan via pivot</button>
</form>
{% endblock %}
